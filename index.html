<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Postcard — Send a little love</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&family=Caveat:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FAF8F4;
      --ink: #1A1A2E;
      --ink-light: #5A5A7A;
      --gold: #C9963D;
      --gold-light: #F0E0BC;
      --card-shadow: 0 8px 40px rgba(26,26,46,0.13), 0 2px 8px rgba(26,26,46,0.08);
      --red: #C0392B;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid rgba(26,26,46,0.08);
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--ink);
    }
    .logo span { color: var(--gold); }
    .header-sub {
      font-size: 0.75rem;
      color: var(--ink-light);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Layout ── */
    .app {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 0;
      min-height: calc(100vh - 65px);
    }

    /* ── Left Panel ── */
    .panel {
      padding: 32px 32px;
      border-right: 1px solid rgba(26,26,46,0.08);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .section-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-bottom: 10px;
    }

    /* ── City Picker ── */
    .city-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .city-card {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      aspect-ratio: 4/3;
      border: 2px solid transparent;
      transition: border-color 0.2s, transform 0.15s;
    }
    .city-card:hover { transform: scale(1.03); }
    .city-card.selected { border-color: var(--gold); }
    .city-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .city-card .city-name {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(26,26,46,0.75));
      color: white;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 12px 6px 5px;
      text-align: center;
    }
    .city-card .check {
      display: none;
      position: absolute;
      top: 5px;
      right: 5px;
      background: var(--gold);
      color: white;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      font-size: 10px;
      align-items: center;
      justify-content: center;
    }
    .city-card.selected .check { display: flex; }

    /* ── Form ── */
    .form-group { display: flex; flex-direction: column; gap: 6px; }

    label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--ink-light);
    }

    input, textarea {
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      color: var(--ink);
      background: white;
      border: 1px solid rgba(26,26,46,0.15);
      border-radius: 8px;
      padding: 10px 14px;
      transition: border-color 0.2s;
      outline: none;
      width: 100%;
    }
    input:focus, textarea:focus { border-color: var(--gold); }

    textarea {
      resize: none;
      height: 90px;
      font-family: 'Caveat', cursive;
      font-size: 1rem;
      line-height: 1.5;
    }

    .char-count {
      font-size: 0.7rem;
      color: var(--ink-light);
      text-align: right;
      margin-top: -2px;
    }
    .char-count.over { color: var(--red); }

    /* ── Upload zone ── */
    .upload-zone {
      border: 1.5px dashed rgba(26,26,46,0.2);
      border-radius: 8px;
      padding: 14px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: white;
      position: relative;
    }
    .upload-zone:hover { border-color: var(--gold); background: #FDFBF7; }
    .upload-zone.has-image { border-color: var(--gold); background: var(--gold-light); }
    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
      border: none;
      padding: 0;
    }
    .upload-label {
      font-size: 0.78rem;
      color: var(--ink-light);
      pointer-events: none;
    }
    .upload-label strong { color: var(--ink); }
    .section-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--ink-light);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .section-divider::before, .section-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(26,26,46,0.1);
    }

    /* ── Send Button ── */
    .send-btn {
      background: var(--ink);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      width: 100%;
    }
    .send-btn:hover { background: var(--gold); transform: translateY(-1px); }
    .send-btn:active { transform: translateY(0); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--ink);
      color: white;
      padding: 12px 24px;
      border-radius: 100px;
      font-size: 0.85rem;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast.error { background: var(--red); }

    /* ── Right Panel / Preview ── */
    .preview-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      background: #EFEDE8;
    }

    /* ── The Postcard ── */
    .postcard {
      width: 560px;
      height: 360px;
      background: white;
      border-radius: 4px;
      box-shadow: var(--card-shadow);
      display: grid;
      grid-template-columns: 1fr 1px 1fr;
      overflow: hidden;
      position: relative;
      transition: box-shadow 0.3s;
    }

    /* Left: image + city name */
    .postcard-image {
      position: relative;
      overflow: hidden;
    }
    .postcard-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.4s;
    }
    /* Grain overlay — SVG noise tiled over the photo */
    .postcard-image::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      background-size: 180px 180px;
      opacity: 0.09;
      mix-blend-mode: overlay;
      pointer-events: none;
      z-index: 2;
    }
    .postcard-city-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.6));
      color: white;
      font-family: 'Great Vibes', cursive;
      font-size: 1.5rem;
      padding: 24px 14px 10px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.4);
      letter-spacing: 0.02em;
    }
    .postcard-city-label small {
      display: block;
      font-family: 'Inter', sans-serif;
      font-size: 0.48rem;
      font-style: normal;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.8;
      margin-bottom: 1px;
    }

    /* Divider */
    .postcard-divider {
      background: rgba(26,26,46,0.1);
      width: 1px;
    }

    

    /* Stamp */
    .stamp {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 52px;
      height: 64px;
      border: 1.5px solid var(--gold);
      border-radius: 2px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 5px;
    }
    .stamp::before {
      content: '';
      position: absolute;
      inset: -5px;
      background:
        radial-gradient(circle, var(--bg) 2px, transparent 2px) -5px -5px / 10px 10px,
        radial-gradient(circle, var(--bg) 2px, transparent 2px) 0px -5px / 10px 10px;
    }
    .stamp-icon { font-size: 1.3rem; }
    .stamp-text {
      font-size: 0.4rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 600;
      text-align: center;
    }

    /* Message area */
    .postcard-message-area {
      flex: 1;
      padding-right: 60px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding-top: 6px;
    }
    .postcard-message-label {
      font-size: 0.5rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-bottom: 6px;
    }
    .postcard-message-text {
      font-family: 'Caveat', cursive;
      font-size: 1rem;
      line-height: 1.55;
      color: #5C5C5C;
      min-height: 80px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .postcard-message-text.placeholder { color: rgba(92,92,92,0.3); }

    /* Address lines */
    .postcard-address {
      border-top: 1px solid rgba(26,26,46,0.1);
      padding-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .address-line {
      height: 1px;
      background: rgba(26,26,46,0.15);
      width: 100%;
      position: relative;
    }
    .address-to {
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-bottom: 2px;
    }
    .address-name {
      font-family: 'Caveat', cursive;
      font-size: 0.95rem;
      color: #5C5C5C;
      min-height: 18px;
    }
    .address-name.placeholder { color: rgba(92,92,92,0.3); }

    /* Right side cream background */
    .postcard-right {
      padding: 20px 18px 16px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      background: #FDF8F0;
    }

    /* postmark circle */
    .postmark {
      position: absolute;
      bottom: 70px;
      right: 12px;
      width: 44px;
      height: 44px;
      border: 1.5px solid rgba(26,26,46,0.15);
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .postmark-text {
      font-size: 0.35rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--ink-light);
      text-align: center;
      line-height: 1.3;
    }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .preview-panel { padding: 24px 16px; }
      .postcard { width: 100%; max-width: 480px; height: auto; aspect-ratio: 14/9; }
      header { padding: 16px 20px; }
      .panel { padding: 20px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">post<span>.</span></div>
  <div class="header-sub">Send a little love ✉</div>
</header>

<div class="app">
  <!-- LEFT PANEL -->
  <div class="panel">

    <div>
      <div class="section-label">Choose a city</div>
      <div class="city-grid" id="cityGrid"></div>
    </div>

    <div class="section-divider">or</div>

    <div>
      <div class="section-label">Upload your own photo</div>
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="photoUpload" accept="image/*" />
        <div class="upload-label" id="uploadLabel">
          <strong>Click to upload</strong> — jpg, png, webp
        </div>
      </div>
      <div class="form-group" id="locationGroup" style="margin-top: 10px; display: none;">
        <label for="uploadLocation">Location</label>
        <input type="text" id="uploadLocation" placeholder="e.g. Malibu, California" />
      </div>
    </div>

    <div class="form-group">
      <label for="msgInput">Your message</label>
      <textarea id="msgInput" placeholder="Wish you were here…" maxlength="200"></textarea>
      <div class="char-count" id="charCount">0 / 200</div>
    </div>

    <div class="form-group">
      <label for="toName">To</label>
      <input type="text" id="toName" placeholder="Friend's name" />
    </div>

    <button class="send-btn" id="sendBtn" onclick="sendPostcard()">Send via iMessage 💬</button>

  </div>

  <!-- RIGHT PANEL: PREVIEW -->
  <div class="preview-panel">
    <div class="postcard" id="postcard">

      <!-- Left: city photo -->
      <div class="postcard-image">
        <img id="postcardImg" src="" alt="" />
        <div class="postcard-city-label">
          <small>Greetings from</small>
          <span id="previewCity">—</span>
        </div>
      </div>

      <!-- Divider -->
      <div class="postcard-divider"></div>

      <!-- Right: message + address -->
      <div class="postcard-right">

        <!-- Stamp -->
        <div class="stamp">
          <div class="stamp-icon">✉</div>
          <div class="stamp-text">First<br>Class</div>
        </div>

        <!-- Postmark -->
        <div class="postmark">
          <div class="postmark-text" id="postmarkCity">City<br>—<br>2025</div>
        </div>

        <!-- Message -->
        <div class="postcard-message-area">
          <div class="postcard-message-label">Message</div>
          <div class="postcard-message-text placeholder" id="previewMsg">Wish you were here…</div>
        </div>

        <!-- Address -->
        <div class="postcard-address">
          <div class="address-to">To</div>
          <div class="address-name placeholder" id="previewTo">Friend's name</div>
          <div class="address-line"></div>
          <div class="address-line"></div>
        </div>

      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── City data ─────────────────────────────────────────────────────
  const cities = [
    { name: 'New York',      country: 'United States', emoji: '🗽', photo: 'https://images.unsplash.com/photo-1496442226666-8d4d0e62e6e9?w=800&q=80' },
    { name: 'Paris',         country: 'France',        emoji: '🗼', photo: 'https://images.unsplash.com/photo-1502602898657-3e91760cbb34?w=800&q=80' },
    { name: 'Tokyo',         country: 'Japan',         emoji: '🏯', photo: 'https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?w=800&q=80' },
    { name: 'Los Angeles',   country: 'United States', emoji: '🌴', photo: 'https://images.unsplash.com/photo-1534190760961-74e8c1c5c3da?w=800&q=80' },
    { name: 'Rome',          country: 'Italy',         emoji: '🛵', photo: 'https://images.unsplash.com/photo-1552832230-c0197dd311b5?w=800&q=80' },
    { name: 'San Francisco', country: 'United States', emoji: '🌉', photo: 'https://images.unsplash.com/photo-1501594907352-04cda38ebc29?w=800&q=80' },
  ];

  let selectedCity = null;

  // ── Render city grid ──────────────────────────────────────────────
  const grid = document.getElementById('cityGrid');
  cities.forEach((city, i) => {
    const el = document.createElement('div');
    el.className = 'city-card';
    el.innerHTML = `
      <img src="${city.photo}" alt="${city.name}" loading="lazy" />
      <div class="city-name">${city.name}</div>
      <div class="check">✓</div>
    `;
    el.addEventListener('click', () => selectCity(i, el));
    grid.appendChild(el);
  });

  function selectCity(i, el) {
    document.querySelectorAll('.city-card').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    // Reset upload zone
    uploadZone.classList.remove('has-image');
    uploadLabel.innerHTML = '<strong>Click to upload</strong> — jpg, png, webp';
    document.getElementById('locationGroup').style.display = 'none';
    document.getElementById('uploadLocation').value = '';
    selectedCity = cities[i];
    updatePostcardPreview(selectedCity.photo, selectedCity.name);
    document.getElementById('postmarkCity').textContent = selectedCity.name + '\n—\n2025';
  }

  function updatePostcardPreview(photoSrc, cityName) {
    const img = document.getElementById('postcardImg');
    img.style.opacity = 0;
    img.src = photoSrc;
    setTimeout(() => img.style.opacity = 1, 50);
    document.getElementById('previewCity').textContent = cityName || '—';
  }

  // ── Photo upload ──────────────────────────────────────────────────
  const photoUpload = document.getElementById('photoUpload');
  const uploadZone  = document.getElementById('uploadZone');
  const uploadLabel = document.getElementById('uploadLabel');

  photoUpload.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const dataUrl = ev.target.result;
      document.querySelectorAll('.city-card').forEach(c => c.classList.remove('selected'));
      selectedCity = { name: '', country: '', emoji: '📸', photo: dataUrl, isUpload: true };
      updatePostcardPreview(dataUrl, '');
      document.getElementById('postmarkCity').textContent = 'My\n—\nPhoto';
      uploadZone.classList.add('has-image');
      uploadLabel.innerHTML = `<strong>${file.name}</strong> ✓`;
      // Show location input
      document.getElementById('locationGroup').style.display = 'flex';
    };
    reader.readAsDataURL(file);
  });

  // Wire location input to postcard preview
  document.getElementById('uploadLocation').addEventListener('input', (e) => {
    const val = e.target.value.trim();
    document.getElementById('previewCity').textContent = val || '—';
    if (selectedCity) selectedCity.name = val;
    document.getElementById('postmarkCity').textContent = (val || 'My') + '\n—\n2025';
  });

  // ── Live preview wiring ───────────────────────────────────────────
  const msgInput  = document.getElementById('msgInput');
  const toName    = document.getElementById('toName');
  const charCount = document.getElementById('charCount');

  msgInput.addEventListener('input', () => {
    const val = msgInput.value;
    charCount.textContent = `${val.length} / 200`;
    charCount.classList.toggle('over', val.length > 180);
    const previewMsg = document.getElementById('previewMsg');
    previewMsg.textContent = val.trim() || 'Wish you were here…';
    previewMsg.classList.toggle('placeholder', !val.trim());
  });

  toName.addEventListener('input', () => {
    const previewTo = document.getElementById('previewTo');
    previewTo.textContent = toName.value.trim() || "Friend's name";
    previewTo.classList.toggle('placeholder', !toName.value.trim());
  });

  // ── Toast ─────────────────────────────────────────────────────────
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => t.className = 'toast', 3500);
  }

  // ── Share / Send ──────────────────────────────────────────────────
  async function sendPostcard() {
    if (!selectedCity)          return showToast('Pick a city first!', true);
    if (!msgInput.value.trim()) return showToast('Write a message!', true);
    if (!toName.value.trim())   return showToast('Add a name!', true);

    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    btn.textContent = 'Creating postcard…';

    try {
      // Snapshot the live postcard div at 2x resolution
      const postcard = document.getElementById('postcard');
      const canvas = await html2canvas(postcard, {
        scale: 2,
        useCORS: true,
        allowTaint: false,
        backgroundColor: null,
        logging: false,
      });

      canvas.toBlob(async (blob) => {
        const file = new File([blob], 'postcard.png', { type: 'image/png' });

        // Try native share sheet (works on iOS Safari + some Android)
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({
            files: [file],
            title: `A postcard for ${toName.value.trim()}`,
            text: `${msgInput.value.trim()} 💌`,
          });
          showToast('Postcard shared! 💬');
        } else {
          // Desktop fallback: download the image
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `postcard-for-${toName.value.trim().toLowerCase().replace(/\s+/g, '-')}.png`;
          a.click();
          URL.revokeObjectURL(url);
          showToast('Downloaded! Share it from your photos 📸');
        }

        btn.disabled = false;
        btn.textContent = 'Send via iMessage 💬';
      }, 'image/png');

    } catch (err) {
      if (err.name !== 'AbortError') {
        showToast('Something went wrong. Try again.', true);
        console.error(err);
      }
      btn.disabled = false;
      btn.textContent = 'Send via iMessage 💬';
    }
  }
</script>
</body>
</html>
